name: USD-EGP Tracker

on:
  schedule:
    # Every 15 minutes. Note: GitHub cron can be delayed up to ~15 min
    # during peak load — effective cadence may be 15–30 min.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: usd-egp-tracker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_CHANGE: ${{ vars.MIN_CHANGE || '0.05' }}
        run: python tracker.py

      - name: Commit updated state (rebase-safe, retries on race)
        run: |
          git config user.name  "usd-egp-bot"
          git config user.email "bot@users.noreply.github.com"
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state change."
            exit 0
          fi
          git add state.json
          git commit -m "state: update $(date -u +%FT%TZ)"
          # Retry up to 5 times in case another run is pushing concurrently
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Push attempt $i failed — retrying after 3s..."
            sleep 3
          done
          echo "Gave up after 5 push attempts."
          exit 1
